<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agencia Espectral: Portal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #1c2230;
      --text: #e6eaf0;
      --muted: #a8b0be;
      --accent: #78dcff;
      --accent-2: #b48cff;
      --ok: #78dc8c;
      --danger: #ee6262;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #151b25 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, #20293a 0%, var(--panel) 100%);
      border: 1px solid #2e3a52;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 2.2vw, 2rem);
      color: var(--accent);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    #launchBtn {
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #0a0f17;
    }

    #copyBtn {
      background: #2a344a;
      color: var(--text);
      border: 1px solid #3a4967;
    }

    #status {
      margin-top: 16px;
      min-height: 1.3em;
      color: var(--ok);
      font-weight: 600;
      word-break: break-word;
    }

    .help {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #c5ccda;
    }

    code {
      background: #141a25;
      border: 1px solid #2c364b;
      border-radius: 6px;
      padding: 1px 6px;
      color: #dff3ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Agencia Espectral: Doble Fondo</h1>
    <p>Este portal abre el juego local de escritorio (<code>juego.py</code>) usando el servidor <code>portal.py</code>.</p>

    <div class="actions">
      <button id="launchBtn" type="button">Lanzar juego</button>
      <button id="copyBtn" type="button">Copiar comando</button>
    </div>

    <div id="status" role="status" aria-live="polite">Listo para lanzar el juego.</div>

    <p class="help">Si estás en GitHub Pages, primero ejecuta <code>python portal.py</code> y abre <code>http://127.0.0.1:8080</code>.</p>
  </main>

  <script>
    const statusEl = document.getElementById('status');

    const launchCandidates = [
      `${window.location.origin}/launch`,
      `${window.location.protocol}//${window.location.hostname}:8080/launch`,
      'http://127.0.0.1:8080/launch',
      'http://localhost:8080/launch',
    ].filter((v, i, arr) => v && arr.indexOf(v) === i);

    function simplifyServerError(raw) {
      const text = (raw || '').trim();
      const lower = text.toLowerCase();
      if (!text) return 'No hubo respuesta del servidor.';
      if (lower.includes("there isn't a github pages site here")) {
        return 'La URL usada no apunta al portal local (respondió GitHub Pages).';
      }
      if (lower.includes('<html') || lower.includes('<!doctype html')) {
        return 'El servidor devolvió HTML en vez de abrir el juego.';
      }
      return text.slice(0, 200);
    }

    document.getElementById('launchBtn').addEventListener('click', async () => {
      statusEl.textContent = 'Intentando abrir juego...';

      let lastError = 'No se pudo contactar al portal local.';

      for (const launchUrl of launchCandidates) {
        try {
          statusEl.textContent = `Probando ${launchUrl}...`;

          let res = await fetch(launchUrl, { method: 'POST' });

          if (res.status === 405) {
            res = await fetch(launchUrl, { method: 'GET' });
          }

          const msg = await res.text();

          if (!res.ok) {
            lastError = simplifyServerError(msg);
            continue;
          }

          statusEl.textContent = msg || 'Juego abierto.';
          return;

        } catch (err) {
          lastError = err.message || 'Error de red.';
        }
      }

      statusEl.textContent = `Error: ${lastError}. Ejecuta "python portal.py" primero.`;
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText('python juego.py');
      statusEl.textContent = 'Comando copiado: python juego.py';
    });
  </script>
</body>
</html>
